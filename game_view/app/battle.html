<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle</title>
    <link rel="stylesheet" href="../styles/battle/battle.css">
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>
    <div class="Sounds">
        <audio id="SoundCreateSword" src="../../assets/sounds/Anvil/use.mp3"></audio>
        <audio id="SoundClick" src="../../assets/sounds/Click/click.mp3"></audio>
    </div>
    <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Game UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="game-container">
     <!-- Header -->
    <div class="header">
      <p class="div">Time round: <span>60s</span></p>
      <p class="div">Round <span>1/3</span></p>
    </div>

    <div class="battle-area">
      <!-- Barra da esquerda -->
      <div class="bar left">
        <div class="fill red div-white"></div>
        <div class="fill orange div-white"></div>
        <div class="fill green div-white"></div>
        <br>
        <button class="div">E</button>
        <span class="bar-text">???????d</span>
      </div>

      <!-- Cards -->
      <div class="cards">
        <div class="card-container ">
            <div class="card red-card div">
             <img src="../../assets/images/others/AnySword/use.png" alt="Knife">
            </div>
        <p>?????? ?????</p>
        <button class="confirm-btn div">Waiting confirmation</button>
        </div> 
        <div class="versus">X</div>
        <div class="card-container">
        <div class="card blue-card div"></div>
          <p>NoobSword</p>
          <button class="confirm-btn div">Confirm Sword</button>
        </div> 
      </div>

      <!-- Barra da direita -->
      <div class="bar right">
        <div class="fill red div-white"></div>
        <div class="fill orange div-white"></div>
        <div class="fill green div-white"></div>
        <br>
        <button class="div">E</button>
        <span class="bar-text">2200d</span>
      </div>
    </div>

    <!-- Shields e Swords -->
    <div class="inventory">
      <div class="shields">
        <p>Shields</p>
        <div class="slots">
          <div class="slot div"></div>
          <div class="slot div"> </div>
          <div class="slot div"> </div>
        </div>
      </div>
      <div class="health-bars">
        <div class="health red div-white">Life: 100/100</div>
        <div class="health blue div-white">Energy: 100/100</div> 
      </div> 

      <div class="swords"> 
        <p>Swords</p>
        <div class="slots">
          <div class="slot div">
</div>
          <div class="slot div"></div>
          <div class="slot div"></div>
        </div>
      </div>
    </div>

    <!-- Health bars -->
   </div>
    
</body>
</html>

    <script type="module" src="../../scripts/main.js"></script>
    <!-- <script type="module" src="../../scripts/LoadPage/main.js"></script> -->
</body>
</html>
